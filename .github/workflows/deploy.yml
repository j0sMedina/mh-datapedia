name: CI / Deploy

on:
  push:
    branches: [master]

jobs:
  # ── Detect which paths changed ──────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/shared/**'
              - 'fly.api.toml'
            web:
              - 'apps/web/**'
              - 'packages/shared/**'
              - 'fly.web.toml'

  # ── Run full test suite with a real Postgres instance ───────────────────────
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mh_datapedia_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mh_datapedia_test
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @mh-datapedia/shared build

      - name: Generate Prisma client
        run: pnpm --filter @mh-datapedia/api exec prisma generate

      - name: Run database migrations
        run: pnpm --filter @mh-datapedia/api exec prisma migrate deploy

      - name: Create test env file
        run: |
          printf 'DATABASE_URL=postgresql://postgres:postgres@localhost:5432/mh_datapedia_test\n' > apps/api/.env.test
          printf 'JWT_SECRET=${{ secrets.JWT_SECRET }}\n' >> apps/api/.env.test
          printf 'JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}\n' >> apps/api/.env.test
          printf 'NODE_ENV=test\n' >> apps/api/.env.test
          printf 'PORT=3002\n' >> apps/api/.env.test
          printf 'CORS_ORIGIN=http://localhost:5173\n' >> apps/api/.env.test

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  # ── Deploy API (only if api/shared/fly.api.toml changed) ────────────────────
  deploy-api:
    needs: [test, changes]
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy API
        run: flyctl deploy --config fly.api.toml --remote-only

  # ── Deploy Web (only if web/shared/fly.web.toml changed) ────────────────────
  deploy-web:
    needs: [test, changes]
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy Web
        run: flyctl deploy --config fly.web.toml --remote-only

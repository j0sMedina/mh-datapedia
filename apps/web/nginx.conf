server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Fly.io internal DNS resolver — required to resolve .internal hostnames at request time
    resolver [fdaa::3] valid=10s;

    # Proxy API calls to the API app on Fly's private network.
    # Using a variable forces Nginx to resolve the hostname per-request instead of at
    # startup, which avoids a crash when the .internal DNS isn't ready yet.
    location /api/ {
        set $api_upstream http://mh-datapedia-api.internal:3001;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback — all non-file routes serve index.html so React Router works
    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Fly.io internal DNS resolver — required to resolve .internal hostnames at request time
    resolver [fdaa::3] valid=10s;

    # .flycast routes through Fly's proxy layer, which handles auto-starting
    # stopped machines. .internal bypasses the proxy and hits machines directly,
    # which fails when the machine is stopped (connection refused on port 3001).
    location /api/ {
        set $api_upstream http://mh-datapedia-api.flycast:3001;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback — all non-file routes serve index.html so React Router works
    location / {
        try_files $uri $uri/ /index.html;
    }
}

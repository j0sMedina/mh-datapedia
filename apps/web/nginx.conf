server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls — "api:3001" for docker-compose, internal hostname for Fly.io
    location /api/ {
        proxy_pass http://mh-datapedia-api.internal:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback — all non-file routes serve index.html so React Router works
    location / {
        try_files $uri $uri/ /index.html;
    }
}

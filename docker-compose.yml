services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mh_datapedia
      POSTGRES_USER: mhuser
      POSTGRES_PASSWORD: mhpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mhuser -d mh_datapedia"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:

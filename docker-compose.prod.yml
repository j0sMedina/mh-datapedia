services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mh_datapedia
      POSTGRES_USER: mhuser
      POSTGRES_PASSWORD: mhpass
    env_file: .env.prod
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mhuser -d mh_datapedia"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env.prod
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    # Port 3001 is NOT exposed to the host — only reachable by the web container

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata_prod:

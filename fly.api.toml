app = "mh-datapedia-api"
primary_region = "ams"

[build]
  dockerfile = "apps/api/Dockerfile"

[deploy]
  release_command = "node_modules/.bin/prisma migrate deploy --schema=prisma/schema.prisma"

[env]
  NODE_ENV = "production"
  PORT = "3001"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
